name: Deploy Front to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  contract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout front
        uses: actions/checkout@v6

      - name: Checkout back
        uses: actions/checkout@v6
        with:
          repository: RGB234/marigold_server
          path: backend-source
          sparse-checkout: |
            src/main/resources/validation-policy.json
          sparse-checkout-cone-mode: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run check:validation-policy
        env:
          VALIDATION_POLICY_SOURCE: backend-source/src/main/resources/validation-policy.json

  build:
    needs: contract
    runs-on: ubuntu-latest

    env:
      VITE_BACKEND_URL: ${{ vars.VITE_BACKEND_URL }}
      VITE_API_V1_BASE: ${{ vars.VITE_API_V1_BASE }}
      VITE_API_OAUTH2_KAKAO: ${{ vars.VITE_API_OAUTH2_KAKAO }}
      VITE_API_OAUTH2_NAVER: ${{ vars.VITE_API_OAUTH2_NAVER }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build:prod
      - run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
